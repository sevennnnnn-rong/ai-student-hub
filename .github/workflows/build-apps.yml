name: Build Native Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Build all platforms'
        required: false
        default: 'true'

jobs:
  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/out/

  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: frontend/out/
      - run: npx cap add android || true
      - run: npx cap sync android
      - name: Build APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

  build-windows:
    needs: build-web
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: frontend/out/
      - name: Install Electron dependencies
        working-directory: frontend/electron
        run: npm ci
      - name: Copy web assets
        run: npx cap sync @capacitor-community/electron
      - name: Build Windows EXE
        working-directory: frontend/electron
        run: npm run electron:make -- --win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: frontend/electron/dist/*.exe

  build-macos:
    needs: build-web
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: frontend/out/
      - name: Install Electron dependencies
        working-directory: frontend/electron
        run: npm ci
      - name: Copy web assets
        run: npx cap sync @capacitor-community/electron
      - name: Build macOS DMG
        working-directory: frontend/electron
        run: npm run electron:make -- --mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: frontend/electron/dist/*.dmg

  release:
    needs: [build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-apk/app-debug.apk
            windows-exe/*.exe
            macos-dmg/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
